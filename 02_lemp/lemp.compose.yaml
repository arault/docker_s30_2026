---
name: lempstack
services:
  websvc:
    image: nginx:1.31
    container_name: web
    ports:
      - 80:80
    restart: unless-stopped
    networks:
      lempnet:
        ipv4_address: 172.40.0.100
    volumes:
      - ./html/:/usr/share/nginx/html/
      - ./nginx-conf/:/etc/nginx/conf.d/
    depends_on:
      - phpsvc

  phpsvc:
    image: php:8.5-fpm
    container_name: php
    restart: unless-stopped
    networks:
      lempnet:
        ipv4_address: 172.40.0.110
    volumes:
      - ./html/:/var/www/html/

  dbsvc:
    image: mariadb:12.3
    container_name: db
    restart: unless-stopped
    networks:
      lempnet:
        ipv4_address: 172.40.0.120
    volumes:
      - datadb:/var/lib/mysql/
    env_file: ./mariadb.env

volumes:
  datadb:

networks:
  lempnet:
    ipam:
      config:
        - subnet: 172.40.0.0/16
          gateway: 172.40.255.254
    driver_opts:
      com.docker.network.bridge.name: lempnet0
