---
name: traefik
services:
  proxy:
    image: traefik:3.7
    container_name: proxy
    ports:
      - 80:80
      - 8080:8080
    networks:
      proxynet:
    volumes:
      - /run/docker.sock:/run/docker.sock
      - ./traefik_conf/:/etc/traefik/

networks:
  proxynet:
    name: proxynet
    driver_opts:
      com.docker.network.bridge.name: proxynet0
